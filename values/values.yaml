# ==============================================
# HELM VALUES — vhiweb-test-full
# ==============================================

appName: vhiweb-test-full
namespace: portofolio

replicaCount: 1

# Image Configuration
# Build image for K8s with:
#   docker build \
#     --build-arg NEXT_BASE_PATH=/portofolio/show/vhiweb-test-full \
#     --build-arg NEXT_PUBLIC_BASE_URL_API=/portofolio/show/vhiweb-test-full/api/v1 \
#     -t 192.168.20.21/other/vhiweb-test-full:1.0.0 .
#   docker push 192.168.20.21/other/vhiweb-test-full:1.0.0
image:
    repository: 192.168.20.21/other/vhiweb-test-full
    tag: "1.0.0"
    pullPolicy: Always

imagePullSecrets:
    - name: harbor-creds

nameOverride: ""
fullnameOverride: ""

containerPort: 5000

service:
    type: NodePort
    port: 5000
    targetPort: 5000
    nodePort: 30234

ingress:
    enabled: true
    className: nginx
    annotations:
        nginx.ingress.kubernetes.io/rewrite-target: /$2
        nginx.ingress.kubernetes.io/use-regex: "true"
    hosts:
        - host: ""
          paths:
              - path: /portofolio/show/vhiweb-test-full(/|$)(.*)
                pathType: ImplementationSpecific
    tls: []

probe:
    enabled: true
    liveness:
        path: /
        port: 5000
    readiness:
        path: /
        port: 5000

resources:
    requests:
        cpu: 100m
        memory: 256Mi
    limits:
        cpu: 200m
        memory: 256Mi

# Autoscaling (disabled — aktifkan jika traffic tinggi)
autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

# Environment variables (non-sensitive)
env:
    - name: NODE_ENV
      value: "production"
    - name: PORT
      value: "5000"
    - name: SECRET_KEY
      value: "vhiweb-secret-2024"
    - name: MongoDBURL
      value: "mongodb://enrichoalkalas01:Kx9mL2nQ7wR5pT3uY6sA1Zv4Bc8Hj0Mf@192.168.20.4:27018/vhiweb?authSource=admin"
    # MySQL (if needed)
    - name: DATABASE_HOST
      value: "mysql"
    - name: DATABASE_USER
      value: "vhiweb"
    - name: DATABASE_PASSWORD
      value: "vhiweb123!"
    - name: DATABASE_NAME
      value: "vhiweb"

# Environment from ConfigMap/Secret
envFrom: []
# - configMapRef:
#     name: app-config
# - secretRef:
#     name: app-secret

# Volume Mounts
volumeMounts: []
# - name: config-volume
#   mountPath: /app/config

# Volumes
volumes: []
# - name: config-volume
#   configMap:
#     name: app-config

# Host Aliases
hostAliases: []
# - ip: "192.168.20.8"
#   hostnames:
#     - "kafka.local"

# Node Selector
nodeSelector: {}
# disktype: ssd

# Tolerations
tolerations: []
# - key: "dedicated"
#   operator: "Equal"
#   value: "app"
#   effect: "NoSchedule"

# Affinity
affinity: {}

# Pod Security Context
podSecurityContext: {}
# fsGroup: 1000

# Container Security Context
securityContext: {}
# runAsNonRoot: true
# runAsUser: 1000

# Service Account
serviceAccount:
    create: false
    name: ""
    annotations: {}
