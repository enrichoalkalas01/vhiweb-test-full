version: '3.8'

services:
  # MongoDB service
  mongodb:
    image: mongo:7.0
    container_name: vhiweb-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: vhiweb
      MONGO_INITDB_ROOT_PASSWORD: vhiweb123!
      MONGO_INITDB_DATABASE: vhiweb
    ports:
      - "8204:27017"
    volumes:
      - mongodb_data:/data/db
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'

  # MySQL service
  mysql:
    image: mysql:8.0
    container_name: vhiweb-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: vhiweb123!
      MYSQL_DATABASE: vhiweb
      MYSQL_USER: vhiweb
      MYSQL_PASSWORD: vhiweb123!
    ports:
      - "8201:3306"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'

  # PHPMyAdmin service
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: vhiweb-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: vhiweb123!
    ports:
      - "8202:80"
    depends_on:
      - mysql
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '512M'

  # App — Express API + Next.js static frontend (single container)
  app:
    build:
      context: .          # root context (needs both frontend/ and backend/)
      dockerfile: Dockerfile
    container_name: vhiweb-app
    restart: always
    environment:
      PORT: 5000
      SECRET_KEY: vhiweb-secret-2024
      NODE_ENV: production
      # Use local MongoDB (inside compose network)
      MongoDBURL: mongodb://vhiweb:vhiweb123!@mongodb:27017/vhiweb?authSource=admin
      # MySQL (if needed)
      DATABASE_HOST: mysql
      DATABASE_USER: vhiweb
      DATABASE_PASSWORD: vhiweb123!
      DATABASE_NAME: vhiweb
    ports:
      - "8200:5000"   # http://localhost:8200 → frontend + API
    depends_on:
      - mongodb
      - mysql
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: '768M'

volumes:
  mysql_data:
    external: false
  mongodb_data:
    external: false
